<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="icon/Profile.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Luvora</title>
  </head>
  <body>
    <nav>
      <div class="logo">&#xF02D;&#xF01A;RA</div>
      <div class="search-container">
        <input type="text" placeholder="Search" id="searchBar" />
        <span class="icon"><i class="fa-solid fa-magnifying-glass"></i></span>
      </div>
    </nav>
    <header>
      <div class="all">
        <h1>
          ALL
          <span id="count" class="count-badge">0</span>
        </h1>
      </div>
    </header>
    <div id="product-list"></div>
    <button id="loadMore">Load More</button>
    <footer>
      © 2025 Luvora — Affiliate product listings only. Clicking redirects to
      partner stores.
    </footer>
    <script src="loadMoreProduct.js"></script>
    <script src="search.js"></script>
  </body>
</html>
